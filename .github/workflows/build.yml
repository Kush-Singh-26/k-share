name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-server:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            runner: ubuntu-latest
            arch: amd64
          - os: windows
            runner: windows-latest
            arch: amd64
          - os: darwin
            runner: macos-latest
            arch: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install dependencies
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libayatana-appindicator3-dev libx11-dev libxcursor-dev libxinerama-dev libxrandr-dev libxf86vm-dev libgl1-mesa-dev

      - name: Build server
        working-directory: server
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows" ]; then
            go install github.com/tc-hib/go-winres@latest
            go-winres make
            CGO_ENABLED=1 GOOS=windows GOARCH=amd64 go build -trimpath -ldflags="-s -w -H windowsgui" -o ../k-share-server.exe
          else
            CGO_ENABLED=1 GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} go build -trimpath -ldflags="-s -w" -o ../k-share-server-${{ matrix.os }}-${{ matrix.arch }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-${{ matrix.os }}-${{ matrix.arch }}
          path: k-share-server*

  build-tui:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            runner: ubuntu-latest
            arch: amd64
          - os: windows
            runner: windows-latest
            arch: amd64
          - os: darwin
            runner: macos-latest
            arch: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install dependencies
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxcursor-dev libxinerama-dev libxrandr-dev libxf86vm-dev libgl1-mesa-dev

      - name: Build TUI
        working-directory: desktop-app
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows" ]; then
            CGO_ENABLED=1 GOOS=windows GOARCH=amd64 go build -tags tui -trimpath -ldflags="-s -w" -o ../k-share-tui.exe main_tui.go
          else
            CGO_ENABLED=1 GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} go build -tags tui -trimpath -ldflags="-s -w" -o ../k-share-tui-${{ matrix.os }}-${{ matrix.arch }} main_tui.go
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tui-${{ matrix.os }}-${{ matrix.arch }}
          path: k-share-tui*

  build-gui:
    needs: build-server
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
          - os: windows-latest
            target: windows
          - os: macos-latest
            target: darwin
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install Fyne dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libgl1-mesa-dev xorg-dev libayatana-appindicator3-dev liblzma-dev libstdc++-12-dev

      - name: Build GUI
        working-directory: desktop-app
        run: |
          go install fyne.io/tools/cmd/fyne@latest
          fyne package --os ${{ matrix.target }} --icon ../assets/Icon.png --name k-share-desktop --release --app-id com.kshare.desktop

      - name: Rename artifact
        if: matrix.target == 'darwin'
        working-directory: desktop-app
        run: mv k-share-desktop.app k-share-desktop-macos-arm64.app

      - name: Zip macOS app
        if: matrix.target == 'darwin'
        working-directory: desktop-app
        run: zip -r ../k-share-desktop-macos-arm64.zip k-share-desktop-macos-arm64.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gui-${{ matrix.target }}
          path: |
            desktop-app/k-share-desktop*
            !desktop-app/*.app
            !desktop-app/*.zip

      - name: Upload macOS app
        if: matrix.target == 'darwin'
        uses: actions/upload-artifact@v4
        with:
          name: gui-darwin-app
          path: k-share-desktop-macos-arm64.zip

  release:
    needs: [build-server, build-tui, build-gui]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure
        run: find artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.exe
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            artifacts/tui-*/*
            artifacts/server-*/*
            artifacts/gui-*/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}