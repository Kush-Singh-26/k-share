name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-server:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            runner: ubuntu-latest
          - os: windows
            runner: windows-latest
          - os: darwin
            runner: macos-13
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install dependencies
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libayatana-appindicator3-dev libx11-dev

      - name: Build server
        working-directory: server
        shell: bash
        run: |
          EXT=""
          if [ "${{ matrix.os }}" = "windows" ]; then
            EXT=".exe"
          fi
          CGO_ENABLED=1 GOOS=${{ matrix.os }} GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o ../k-share-server-${{ matrix.os }}-amd64${EXT}

  build-tui:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            runner: ubuntu-latest
          - os: windows
            runner: windows-latest
          - os: darwin
            runner: macos-13
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install dependencies
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev

      - name: Build TUI
        working-directory: desktop-app
        shell: bash
        run: |
          EXT=""
          if [ "${{ matrix.os }}" = "windows" ]; then
            EXT=".exe"
          fi
          CGO_ENABLED=1 GOOS=${{ matrix.os }} GOARCH=amd64 go build -tags tui -trimpath -ldflags="-s -w" -o ../k-share-tui-${{ matrix.os }}-amd64${EXT} main_tui.go

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tui-${{ matrix.os }}-amd64
          path: k-share-tui-${{ matrix.os }}-amd64*

  build-gui:
    needs: build-server
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
          - os: windows-latest
            target: windows
          - os: macos-latest
            target: darwin
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install Fyne dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libglib2.0-dev libayatana-appindicator3-dev liblzma-dev libstdc++-12-dev

      - name: Build GUI
        working-directory: desktop-app
        run: |
          go get fyne.io/fyne/v2/cmd/fyne
          go install fyne.io/fyne/v2/cmd/fyne@latest
          fyne package -os ${{ matrix.target }} -icon ../assets/Icon.png -name k-share-desktop -release --app-id com.kshare.desktop

      - name: Rename artifact
        if: matrix.target == 'darwin'
        run: mv k-share-desktop.app k-share-desktop-macos-amd64.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gui-${{ matrix.target }}
          path: |
            k-share-desktop-*
            !*.app

      - name: Upload macOS app
        if: matrix.target == 'darwin'
        uses: actions/upload-artifact@v4
        with:
          name: gui-darwin-app
          path: k-share-desktop-macos-amd64.app

  release:
    needs: [build-server, build-tui, build-gui]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure
        run: find artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.exe
            artifacts/build-gui/k-share-desktop-*
            artifacts/*/k-share-tui-*
            artifacts/*/k-share-server-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}